name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't run overlapping deploys; cancel an in-flight one when a newer push lands.
concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  id-token: write # required to request the OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skips cleanly (no red ❌) until the deploy role is wired up — see infra/DEPLOY.md.
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' }}
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build # next build → static export in out/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          # Long-cache the fingerprinted assets, then sync the rest (HTML etc.)
          aws s3 sync out/ "s3://${{ vars.AWS_S3_BUCKET }}/" \
            --delete \
            --exclude "_next/static/*" \
            --cache-control "public, max-age=0, must-revalidate"
          aws s3 sync out/_next/static/ "s3://${{ vars.AWS_S3_BUCKET }}/_next/static/" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
