AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pennybacker AI website — static hosting. Private S3 bucket served through
  CloudFront (Origin Access Control, HTTPS, security headers) plus a GitHub
  Actions OIDC deploy role. Deploy this stack in us-east-1 (CloudFront ACM
  certs must live there). The custom domain is optional and attached in a
  second pass once the ACM cert is validated via DNS.

Parameters:
  GitHubOrg:
    Type: String
    Default: harty15
    Description: GitHub org/user that owns the repo.
  GitHubRepo:
    Type: String
    Default: pennybacker-ai-website
    Description: Repository name (used to scope the OIDC deploy role).
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to assume the deploy role.
  DomainName:
    Type: String
    Default: ""
    Description: >
      Apex domain, e.g. pennybacker-ai.com. Leave blank for the initial launch
      on the *.cloudfront.net URL; set it (with AcmCertificateArn) once the
      cert is issued to attach the custom domain.
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: ARN of an ISSUED ACM cert in us-east-1 covering the domain + www. Leave blank until validated.
  CreateOidcProvider:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >
      Create the GitHub Actions OIDC provider. Set to "false" if this AWS
      account already has token.actions.githubusercontent.com registered
      (only one provider per account is allowed).

Conditions:
  HasCustomDomain: !And
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref AcmCertificateArn, ""]]
  ShouldCreateOidc: !Equals [!Ref CreateOidcProvider, "true"]

Resources:
  # ── Static content bucket (private; reached only via CloudFront OAC) ──────
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── URL rewrite for the static export (trailingSlash folders → index.html) ─
  RewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-rewrite"
      AutoPublish: true
      FunctionConfig:
        Runtime: cloudfront-js-2.0
        Comment: Map directory-style URIs to their index.html
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri.endsWith('/')) {
            request.uri += 'index.html';
          } else if (!uri.split('/').pop().includes('.')) {
            request.uri += '/index.html';
          }
          return request;
        }

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} static site"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Aliases: !If
          - HasCustomDomain
          - [!Ref DomainName, !Sub "www.${DomainName}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: s3origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          # Managed-CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # Managed-SecurityHeadersPolicy (HSTS, X-Content-Type-Options, etc.)
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RewriteFunction.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 10

  # ── GitHub Actions OIDC: provider + least-privilege deploy role ───────────
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOidc
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # AWS validates GitHub's cert via a trusted root CA; this value is no
      # longer pinned but the property is still required.
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Lets GitHub Actions (this repo/branch) deploy the static site.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOidc
                - !Ref GitHubOidcProvider
                - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: deploy-static-site
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: SyncBucket
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt SiteBucket.Arn
              - Sid: WriteObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "${SiteBucket.Arn}/*"
              - Sid: InvalidateCache
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                Resource: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

Outputs:
  BucketName:
    Description: S3 bucket holding the site (set as repo var AWS_S3_BUCKET).
    Value: !Ref SiteBucket
  DistributionId:
    Description: CloudFront distribution id (repo var AWS_CLOUDFRONT_DISTRIBUTION_ID).
    Value: !Ref Distribution
  DistributionDomainName:
    Description: The live *.cloudfront.net URL.
    Value: !GetAtt Distribution.DomainName
  DeployRoleArn:
    Description: Role for GitHub Actions to assume (repo var AWS_DEPLOY_ROLE_ARN).
    Value: !GetAtt DeployRole.Arn
